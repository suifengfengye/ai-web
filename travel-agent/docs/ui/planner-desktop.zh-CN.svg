<svg width="1440" height="1024" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="1024" fill="#F8FAFC"/>
  <rect x="24" y="20" width="1392" height="72" rx="22" fill="white" stroke="#E2E8F0"/>
  <text x="58" y="64" fill="#164E63" font-size="28" font-weight="800" font-family="Arial, Helvetica, sans-serif">Travel Agent</text>
  <rect x="1188" y="36" width="196" height="40" rx="14" fill="#ECFEFF"/>
  <text x="1238" y="62" fill="#0E7490" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">重庆 3 天攻略</text>

  <rect x="24" y="116" width="728" height="880" rx="28" fill="white" stroke="#E2E8F0"/>
  <rect x="776" y="116" width="640" height="880" rx="28" fill="white" stroke="#E2E8F0"/>

  <text x="56" y="164" fill="#0F172A" font-size="28" font-weight="800" font-family="Arial, Helvetica, sans-serif">对话规划</text>
  <rect x="56" y="186" width="512" height="32" rx="16" fill="#F0FDFA"/>
  <text x="74" y="207" fill="#0F766E" font-size="15" font-family="Arial, Helvetica, sans-serif">正在解析需求，并检查天气、知识库和路线工具</text>
  <rect x="580" y="186" width="132" height="32" rx="16" fill="#ECFEFF"/>
  <text x="612" y="207" fill="#0891B2" font-size="15" font-family="Arial, Helvetica, sans-serif">已连接 3 个工具</text>

  <rect x="56" y="242" width="364" height="96" rx="24" fill="#ECFEFF"/>
  <text x="80" y="285" fill="#164E63" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">用户</text>
  <text x="80" y="316" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">帮我规划重庆 3 天攻略，五一出发，</text>
  <text x="80" y="344" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">2 个成年人，预算 4000，多安排夜景和火锅。</text>

  <rect x="196" y="366" width="516" height="188" rx="26" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="224" y="406" fill="#0F172A" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">AI 助手</text>
  <rect x="224" y="426" width="122" height="28" rx="14" fill="#DCFCE7"/>
  <text x="248" y="445" fill="#15803D" font-size="14" font-family="Arial, Helvetica, sans-serif">天气已查询</text>
  <rect x="356" y="426" width="146" height="28" rx="14" fill="#ECFEFF"/>
  <text x="382" y="445" fill="#0E7490" font-size="14" font-family="Arial, Helvetica, sans-serif">知识库已检索</text>
  <text x="224" y="490" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">重庆 5 月初天气温和，我建议你采用轻松版路线，</text>
  <text x="224" y="518" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">重点覆盖解放碑、洪崖洞、南山夜景和火锅，</text>
  <text x="224" y="546" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">右侧可以直接查看结构化结果。</text>

  <text x="56" y="602" fill="#0F172A" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">快捷改写</text>
  <rect x="56" y="622" width="116" height="40" rx="20" fill="#F1F5F9"/>
  <text x="88" y="648" fill="#0F172A" font-size="16" font-family="Arial, Helvetica, sans-serif">更省钱</text>
  <rect x="184" y="622" width="116" height="40" rx="20" fill="#F1F5F9"/>
  <text x="214" y="648" fill="#0F172A" font-size="16" font-family="Arial, Helvetica, sans-serif">少走路</text>
  <rect x="312" y="622" width="128" height="40" rx="20" fill="#F1F5F9"/>
  <text x="342" y="648" fill="#0F172A" font-size="16" font-family="Arial, Helvetica, sans-serif">多安排美食</text>
  <rect x="452" y="622" width="128" height="40" rx="20" fill="#F1F5F9"/>
  <text x="486" y="648" fill="#0F172A" font-size="16" font-family="Arial, Helvetica, sans-serif">适合老人</text>
  <rect x="592" y="622" width="120" height="40" rx="20" fill="#F1F5F9"/>
  <text x="622" y="648" fill="#0F172A" font-size="16" font-family="Arial, Helvetica, sans-serif">雨天备选</text>

  <rect x="56" y="848" width="656" height="108" rx="24" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="88" y="892" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">继续补充：酒店区域、交通方式、是否带老人小孩、是否更重视美食...</text>
  <rect x="560" y="874" width="120" height="50" rx="18" fill="#22C55E"/>
  <text x="602" y="906" fill="white" font-size="20" font-weight="700" font-family="Arial, Helvetica, sans-serif">发送</text>

  <text x="808" y="164" fill="#0F172A" font-size="28" font-weight="800" font-family="Arial, Helvetica, sans-serif">结构化行程</text>
  <rect x="808" y="188" width="320" height="30" rx="15" fill="#ECFEFF"/>
  <text x="826" y="208" fill="#0E7490" font-size="14" font-family="Arial, Helvetica, sans-serif">重庆 / 3 天 / 2 成人 / 预算约 3200 - 4200</text>

  <rect x="808" y="242" width="576" height="108" rx="24" fill="#F8FAFC"/>
  <text x="836" y="280" fill="#0F172A" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif">概览</text>
  <text x="836" y="314" fill="#475569" font-size="18" font-family="Arial, Helvetica, sans-serif">一份轻松版重庆 3 天行程，重点覆盖解放碑、洪崖洞、南山夜景和本地火锅。</text>

  <rect x="808" y="372" width="576" height="182" rx="24" fill="white" stroke="#E2E8F0"/>
  <text x="836" y="410" fill="#0F172A" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif">第 1 天</text>
  <text x="836" y="444" fill="#0891B2" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">上午</text>
  <text x="928" y="444" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">解放碑 + 八一路好吃街</text>
  <text x="836" y="474" fill="#0891B2" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">下午</text>
  <text x="928" y="474" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">山城步道 + 十八梯</text>
  <text x="836" y="504" fill="#0891B2" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">晚上</text>
  <text x="928" y="504" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">洪崖洞夜景 + 火锅</text>
  <rect x="1180" y="500" width="172" height="34" rx="17" fill="#DCFCE7"/>
  <text x="1208" y="522" fill="#15803D" font-size="15" font-family="Arial, Helvetica, sans-serif">可替换为两江游船</text>

  <rect x="808" y="576" width="276" height="166" rx="24" fill="#F8FAFC"/>
  <text x="836" y="614" fill="#0F172A" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif">天气</text>
  <text x="836" y="648" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">22℃ - 29℃，多云，局部小雨</text>
  <text x="836" y="680" fill="#64748B" font-size="17" font-family="Arial, Helvetica, sans-serif">建议带薄外套、运动鞋和折叠伞</text>

  <rect x="1108" y="576" width="276" height="166" rx="24" fill="#F8FAFC"/>
  <text x="1136" y="614" fill="#0F172A" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif">预算</text>
  <text x="1136" y="648" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">住宿：1200 - 1800</text>
  <text x="1136" y="678" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">餐饮：900 - 1200</text>
  <text x="1136" y="708" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">交通：600 - 1000</text>

  <rect x="808" y="764" width="576" height="180" rx="24" fill="white" stroke="#E2E8F0"/>
  <text x="836" y="802" fill="#0F172A" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif">注意事项</text>
  <text x="836" y="838" fill="#475569" font-size="18" font-family="Arial, Helvetica, sans-serif">1. 洪崖洞建议 19:00 前抵达，避免高峰拥堵。</text>
  <text x="836" y="868" fill="#475569" font-size="18" font-family="Arial, Helvetica, sans-serif">2. 若带老人出行，建议减少坡道步行并增加打车。</text>
  <text x="836" y="898" fill="#475569" font-size="18" font-family="Arial, Helvetica, sans-serif">3. 热门火锅店排队时间较长，建议提前预约。</text>
</svg>
