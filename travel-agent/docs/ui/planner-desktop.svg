<svg width="1440" height="1024" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="1024" fill="#F8FAFC"/>
  <rect x="24" y="20" width="1392" height="72" rx="22" fill="white" stroke="#E2E8F0"/>
  <text x="58" y="64" fill="#164E63" font-size="28" font-weight="800" font-family="Arial, Helvetica, sans-serif">Travel Agent</text>
  <rect x="1188" y="36" width="196" height="40" rx="14" fill="#ECFEFF"/>
  <text x="1233" y="62" fill="#0E7490" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">Chongqing 3-day trip</text>

  <rect x="24" y="116" width="728" height="880" rx="28" fill="white" stroke="#E2E8F0"/>
  <rect x="776" y="116" width="640" height="880" rx="28" fill="white" stroke="#E2E8F0"/>

  <text x="56" y="164" fill="#0F172A" font-size="28" font-weight="800" font-family="Arial, Helvetica, sans-serif">Conversation planner</text>
  <rect x="56" y="186" width="512" height="32" rx="16" fill="#F0FDFA"/>
  <text x="74" y="207" fill="#0F766E" font-size="15" font-family="Arial, Helvetica, sans-serif">Parsing request and checking weather, knowledge and route tools</text>
  <rect x="580" y="186" width="132" height="32" rx="16" fill="#ECFEFF"/>
  <text x="614" y="207" fill="#0891B2" font-size="15" font-family="Arial, Helvetica, sans-serif">3 tools live</text>

  <rect x="56" y="242" width="364" height="96" rx="24" fill="#ECFEFF"/>
  <text x="80" y="285" fill="#164E63" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">User</text>
  <text x="80" y="316" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">Plan a Chongqing 3-day trip for May holiday,</text>
  <text x="80" y="344" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">2 adults, budget 4000, easy pace, more night views.</text>

  <rect x="196" y="366" width="516" height="188" rx="26" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="224" y="406" fill="#0F172A" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">AI Assistant</text>
  <rect x="224" y="426" width="122" height="28" rx="14" fill="#DCFCE7"/>
  <text x="250" y="445" fill="#15803D" font-size="14" font-family="Arial, Helvetica, sans-serif">Weather done</text>
  <rect x="356" y="426" width="146" height="28" rx="14" fill="#ECFEFF"/>
  <text x="388" y="445" fill="#0E7490" font-size="14" font-family="Arial, Helvetica, sans-serif">Knowledge done</text>
  <text x="224" y="490" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">Weather looks mild. I suggest a lightweight route</text>
  <text x="224" y="518" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">covering Jiefangbei, Hongyadong, Nanshan night view</text>
  <text x="224" y="546" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">and a hotpot dinner. See the structured plan on the right.</text>

  <text x="56" y="602" fill="#0F172A" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">Quick actions</text>
  <rect x="56" y="622" width="116" height="40" rx="20" fill="#F1F5F9"/>
  <text x="82" y="648" fill="#0F172A" font-size="16" font-family="Arial, Helvetica, sans-serif">Cheaper</text>
  <rect x="184" y="622" width="116" height="40" rx="20" fill="#F1F5F9"/>
  <text x="210" y="648" fill="#0F172A" font-size="16" font-family="Arial, Helvetica, sans-serif">Less walking</text>
  <rect x="312" y="622" width="128" height="40" rx="20" fill="#F1F5F9"/>
  <text x="342" y="648" fill="#0F172A" font-size="16" font-family="Arial, Helvetica, sans-serif">More food</text>
  <rect x="452" y="622" width="128" height="40" rx="20" fill="#F1F5F9"/>
  <text x="482" y="648" fill="#0F172A" font-size="16" font-family="Arial, Helvetica, sans-serif">For seniors</text>
  <rect x="592" y="622" width="120" height="40" rx="20" fill="#F1F5F9"/>
  <text x="620" y="648" fill="#0F172A" font-size="16" font-family="Arial, Helvetica, sans-serif">Rain plan</text>

  <rect x="56" y="848" width="656" height="108" rx="24" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="88" y="892" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">Continue editing: hotel area, transport mode, family needs, food priorities...</text>
  <rect x="560" y="874" width="120" height="50" rx="18" fill="#22C55E"/>
  <text x="602" y="906" fill="white" font-size="20" font-weight="700" font-family="Arial, Helvetica, sans-serif">Send</text>

  <text x="808" y="164" fill="#0F172A" font-size="28" font-weight="800" font-family="Arial, Helvetica, sans-serif">Structured itinerary</text>
  <rect x="808" y="188" width="300" height="30" rx="15" fill="#ECFEFF"/>
  <text x="826" y="208" fill="#0E7490" font-size="14" font-family="Arial, Helvetica, sans-serif">Chongqing / 3 days / 2 adults / est. 3200-4200</text>

  <rect x="808" y="242" width="576" height="108" rx="24" fill="#F8FAFC"/>
  <text x="836" y="280" fill="#0F172A" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif">Overview</text>
  <text x="836" y="314" fill="#475569" font-size="18" font-family="Arial, Helvetica, sans-serif">A relaxed 3-day plan focused on downtown spots, night views and signature food.</text>

  <rect x="808" y="372" width="576" height="182" rx="24" fill="white" stroke="#E2E8F0"/>
  <text x="836" y="410" fill="#0F172A" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif">Day 1</text>
  <text x="836" y="444" fill="#0891B2" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">Morning</text>
  <text x="928" y="444" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">Jiefangbei and local snack street</text>
  <text x="836" y="474" fill="#0891B2" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">Afternoon</text>
  <text x="928" y="474" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">Shancheng trail and Eighteen Steps</text>
  <text x="836" y="504" fill="#0891B2" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">Evening</text>
  <text x="928" y="504" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">Hongyadong night view and hotpot</text>
  <rect x="1180" y="500" width="172" height="34" rx="17" fill="#DCFCE7"/>
  <text x="1210" y="522" fill="#15803D" font-size="15" font-family="Arial, Helvetica, sans-serif">Alt: river cruise</text>

  <rect x="808" y="576" width="276" height="166" rx="24" fill="#F8FAFC"/>
  <text x="836" y="614" fill="#0F172A" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif">Weather</text>
  <text x="836" y="648" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">22C - 29C, cloudy, light rain later</text>
  <text x="836" y="680" fill="#64748B" font-size="17" font-family="Arial, Helvetica, sans-serif">Bring a light jacket, sneakers and a foldable umbrella</text>

  <rect x="1108" y="576" width="276" height="166" rx="24" fill="#F8FAFC"/>
  <text x="1136" y="614" fill="#0F172A" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif">Budget</text>
  <text x="1136" y="648" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">Hotel: 1200 - 1800</text>
  <text x="1136" y="678" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">Food: 900 - 1200</text>
  <text x="1136" y="708" fill="#334155" font-size="18" font-family="Arial, Helvetica, sans-serif">Transit: 600 - 1000</text>

  <rect x="808" y="764" width="576" height="180" rx="24" fill="white" stroke="#E2E8F0"/>
  <text x="836" y="802" fill="#0F172A" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif">Notes</text>
  <text x="836" y="838" fill="#475569" font-size="18" font-family="Arial, Helvetica, sans-serif">1. Visit Hongyadong before 7 PM to avoid the heaviest crowd.</text>
  <text x="836" y="868" fill="#475569" font-size="18" font-family="Arial, Helvetica, sans-serif">2. If traveling with seniors, reduce slope-heavy walking and use ride-hailing.</text>
  <text x="836" y="898" fill="#475569" font-size="18" font-family="Arial, Helvetica, sans-serif">3. Popular hotpot places should be booked in advance.</text>
</svg>
